name: Arch Linux

on:
    push:
        branches:
            - master
    pull_request:
    workflow_dispatch:

jobs:
    cuda-build:
        name: Arch Linux CUDA Build
        runs-on: ubuntu-24.04
        env:
            BUILD_DIR: build-archlinux
            CUDA_ARCHITECTURES: 75
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Build in Arch Linux container
              shell: bash
              run: |
                  docker run --rm \
                    -e HOST_UID="$(id -u)" \
                    -e HOST_GID="$(id -g)" \
                    -v "${GITHUB_WORKSPACE}:/workspace" \
                    -w /workspace \
                    archlinux:latest \
                    bash -lc '
                      set -euo pipefail
                      pacman -Syu --noconfirm
                      pacman -S --noconfirm --needed base-devel git python python-pip cuda
                      python -m pip install --break-system-packages cmake==4.1.2 ninja==1.13.0
                      export CUDA_PATH=/opt/cuda
                      export CUDAToolkit_ROOT=/opt/cuda
                      export PATH="/opt/cuda/bin:/usr/local/bin:/root/.local/bin:${PATH}"
                      export LD_LIBRARY_PATH="/opt/cuda/lib64:${LD_LIBRARY_PATH:-}"
                      cmake --version
                      ninja --version
                      test -x /opt/cuda/bin/nvcc
                      nvcc --version
                      cmake -S . -B '"${BUILD_DIR}"' -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CUDA_ARCHITECTURES='"${CUDA_ARCHITECTURES}"' -DCUDAToolkit_ROOT=/opt/cuda
                      cmake --build '"${BUILD_DIR}"' --parallel
                      chown -R "${HOST_UID}:${HOST_GID}" '"${BUILD_DIR}"'
                    '

            - name: Upload Arch Linux artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: stable-fluids-archlinux
                  path: |
                      ${{ env.BUILD_DIR }}/stable-fluids-app
                      ${{ env.BUILD_DIR }}/libstable-fluids.so
